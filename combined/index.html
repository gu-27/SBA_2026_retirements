<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirement Celebration · Gonzaga SBA 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000D20;
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── DISPLAY (party kiosk) ── */
    #display {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vw;
      transition: background 1s ease;
      cursor: pointer;
    }

    #person-label {
      font-size: clamp(.65rem, 1.5vw, .85rem);
      font-weight: 700;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      margin-bottom: clamp(1rem, 3vh, 2rem);
      transition: opacity .4s ease;
    }

    #quote-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 3rem);
      font-style: italic;
      line-height: 1.55;
      text-align: center;
      color: white;
      max-width: min(900px, 90vw);
      transition: opacity .5s ease;
    }

    #person-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 14vw, 10rem);
      font-weight: 700;
      color: rgba(255,255,255,.07);
      position: absolute;
      bottom: -2vw;
      right: 3vw;
      line-height: 1;
      pointer-events: none;
      transition: opacity .4s ease;
      user-select: none;
    }

    /* Progress bar */
    #progress {
      position: fixed;
      bottom: 0; left: 0;
      height: 4px;
      background: rgba(255,255,255,.35);
      transition: width linear;
      border-radius: 0 2px 2px 0;
    }

    /* Counter */
    #counter {
      position: fixed;
      top: 1.25rem; right: 1.5rem;
      font-size: .68rem;
      color: rgba(255,255,255,.25);
      letter-spacing: .08em;
    }

    /* Nav hint */
    #hint {
      position: fixed;
      bottom: 1.25rem; left: 50%;
      transform: translateX(-50%);
      font-size: .65rem;
      color: rgba(255,255,255,.2);
      letter-spacing: .08em;
      white-space: nowrap;
    }

    /* Controls */
    #controls {
      position: fixed;
      top: 1.25rem; left: 1.5rem;
      display: flex;
      gap: .5rem;
      z-index: 10;
    }
    .ctrl {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.6);
      font-family: 'Inter', sans-serif;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      padding: .35rem .8rem;
      border-radius: 100px;
      cursor: pointer;
      transition: background .2s;
    }
    .ctrl:hover { background: rgba(255,255,255,.2); color: white; }
    .ctrl.active { background: rgba(255,255,255,.25); color: white; }

    /* Landing page (shown before display starts) */
    #landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      background: #000D20;
    }
    #landing.hidden { display: none; }
    #display.hidden { display: none; }

    .landing-eyebrow {
      font-size: .65rem; font-weight: 600; letter-spacing: .2em;
      text-transform: uppercase; color: #C8952A; margin-bottom: 1rem;
    }
    .landing-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700; line-height: 1; margin-bottom: .75rem; text-align: center;
    }
    .landing-sub {
      font-size: .9rem; color: rgba(255,255,255,.4);
      letter-spacing: .05em; margin-bottom: 3rem; text-align: center;
    }
    .people-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem; max-width: 900px; width: 100%; margin-bottom: 2.5rem;
    }
    .person-pill {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px; padding: 1.25rem;
      text-align: center;
    }
    .person-pill .pill-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700; color: white; margin-bottom: .2rem;
    }
    .person-pill .pill-count {
      font-size: .68rem; color: rgba(255,255,255,.35); letter-spacing: .06em;
    }
    .person-pill .pill-dot {
      width: 10px; height: 10px; border-radius: 50%;
      margin: .65rem auto .5rem;
    }
    .start-btn {
      background: #C8952A; color: white;
      font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700;
      padding: 1rem 2.5rem; border-radius: 100px; border: none;
      cursor: pointer; letter-spacing: .04em;
      transition: transform .15s, filter .15s;
    }
    .start-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

    /* Fade animation class */
    .fade-out { opacity: 0 !important; }
  </style>
</head>

// ── Display state ─────────────────────────────────────────────────────────────
let shuffled = [];
let cur      = 0;
let paused   = false;
let timer    = null;
const DURATION = 8000;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startDisplay() {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('display').classList.remove('hidden');
  shuffled = shuffle(SLIDES);
  showSlide(0);
  schedule();
  document.addEventListener('keydown', onKey);
}

function stopDisplay() {
  clearTimeout(timer);
  document.getElementById('display').classList.add('hidden');
  document.getElementById('landing').classList.remove('hidden');
  document.removeEventListener('keydown', onKey);
  paused = false;
  document.getElementById('btn-pause').textContent = '⏸ Pause';
}

function showSlide(n) {
  cur = ((n % shuffled.length) + shuffled.length) % shuffled.length;
  const s = shuffled[cur];

  // Fade out
  const qt = document.getElementById('quote-text');
  const pl = document.getElementById('person-label');
  qt.style.opacity = '0';
  pl.style.opacity = '0';

  setTimeout(() => {
    document.getElementById('display').style.background =
      `linear-gradient(135deg, ${s.color} 0%, ${adjustColor(s.color, 20)} 100%)`;
    document.getElementById('person-label').textContent =
      '✦  ' + s.person + '  ✦';
    document.getElementById('quote-text').textContent = s.text;
    document.getElementById('person-name').textContent = s.person;
    document.getElementById('counter').textContent =
      (cur + 1) + ' / ' + shuffled.length;

    qt.style.opacity = '1';
    pl.style.opacity = '1';
  }, 350);

  // Progress bar
  const bar = document.getElementById('progress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${DURATION}ms linear`;
      bar.style.width = '100%';
    });
  });
}

function adjustColor(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0xff) + amount);
  const b = Math.min(255, (num & 0xff) + amount);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function schedule() {
  clearTimeout(timer);
  if (!paused) {
    timer = setTimeout(() => { showSlide(cur + 1); schedule(); }, DURATION);
  }
}

function nextSlide() {
  clearTimeout(timer);
  showSlide(cur + 1);
  if (!paused) schedule();
}

function prevSlide() {
  clearTimeout(timer);
  showSlide(cur - 1);
  if (!paused) schedule();
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  if (paused) {
    clearTimeout(timer);
    btn.textContent = '▶ Resume';
    btn.classList.add('active');
    document.getElementById('progress').style.transition = 'none';
  } else {
    btn.textContent = '⏸ Pause';
    btn.classList.remove('active');
    showSlide(cur);
    schedule();
  }
}

function onKey(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape')     stopDisplay();
  if (e.key === 'p' || e.key === 'P') togglePause();
}
</script>
