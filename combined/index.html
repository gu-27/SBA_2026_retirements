      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.55);
      font-family: 'Inter', sans-serif; font-size: .65rem; font-weight: 600;

// ── State ──────────────────────────────────────────────────────────────────────
const KEYS     = ['tatao', 'jane', 'gary', 'maureen'];
const PER_PAGE = 4;
const DURATION = 14000; // ms per slide

// sequence: flat list of {key, chunkIdx}
// built by interleaving round-robin: tatao[0], jane[0], gary[0], maureen[0], tatao[1]...
let sequence = [];
let chunks   = {};
let page     = 0;
let paused   = false;
let timer    = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildSequence() {
  chunks = {};
  KEYS.forEach(k => {
    const shuffled = shuffle(ALL[k].quotes);
    const c = [];
    for (let i = 0; i < shuffled.length; i += PER_PAGE) {
      const chunk = shuffled.slice(i, i + PER_PAGE);
      // pad last chunk if short
      while (chunk.length < PER_PAGE) {
        chunk.push(shuffled[Math.floor(Math.random() * shuffled.length)]);
      }
      c.push(chunk);
    }
    chunks[k] = c;
  });

  // Interleave round-robin
  sequence = [];
  const maxRounds = Math.max(...KEYS.map(k => chunks[k].length));
  for (let r = 0; r < maxRounds; r++) {
    KEYS.forEach(k => {
      if (r < chunks[k].length) {
        sequence.push({ key: k, chunkIdx: r });
      }
    });
  }
}

function renderPage(n) {
  const { key, chunkIdx } = sequence[n];
  const cfg    = ALL[key];
  const quotes = chunks[key][chunkIdx];

  // Background
  const stage = document.getElementById('stage');
  stage.style.background = cfg.color;

  // Header
  document.getElementById('person-name').textContent = cfg.name;
  document.getElementById('person-role').textContent = cfg.role;

  // Accent color on header border
  document.getElementById('person-header').style.borderBottomColor =
    cfg.accent + '55';

  // Quotes
  for (let i = 0; i < 4; i++) {
    document.getElementById('q' + i).textContent = quotes[i] || '';
  }

  // Counter
  document.getElementById('slide-counter').textContent =
    (n + 1) + ' / ' + sequence.length;

  // Progress bar color
  document.getElementById('progress').style.background = cfg.accent;
}

function showPage(n) {
  page = ((n % sequence.length) + sequence.length) % sequence.length;
  const stage = document.getElementById('stage');

  stage.classList.add('fading');
  setTimeout(() => {
    renderPage(page);
    stage.classList.remove('fading');
  }, 450);

  // Restart progress bar
  const bar = document.getElementById('progress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${DURATION}ms linear`;
      bar.style.width = '100%';
    });
  });
}

function schedule() {
  clearTimeout(timer);
  if (!paused) {
    timer = setTimeout(() => { showPage(page + 1); schedule(); }, DURATION);
  }
}

function nextPage() {
  clearTimeout(timer);
  showPage(page + 1);
  if (!paused) schedule();
}

function prevPage() {
  clearTimeout(timer);
  showPage(page - 1);
  if (!paused) schedule();
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  if (paused) {
    clearTimeout(timer);
    btn.textContent = '\u25B6 Resume';
    btn.classList.add('active');
    document.getElementById('progress').style.transition = 'none';
  } else {
    btn.textContent = '\u23F8 Pause';
    btn.classList.remove('active');
    showPage(page);
    schedule();
  }
}

function startDisplay() {
  buildSequence();
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('display').classList.add('active');
  showPage(0);
  schedule();
  document.addEventListener('keydown', onKey);
}

function stopDisplay() {
  clearTimeout(timer);
  document.getElementById('display').classList.remove('active');
  document.getElementById('landing').classList.remove('hidden');
  document.removeEventListener('keydown', onKey);
  paused = false;
  document.getElementById('btn-pause').textContent = '\u23F8 Pause';
  document.getElementById('btn-pause').classList.remove('active');
}

function onKey(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prevPage(); }
  if (e.key === 'Escape')     stopDisplay();
  if (e.key === 'p' || e.key === 'P') togglePause();
}

document.getElementById('display').addEventListener('click', function(e) {
  if (e.target.closest('.ctrl')) return;
  nextPage();
});
</script>
</body>
