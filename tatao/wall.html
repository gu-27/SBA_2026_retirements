<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ta-Tao · Memory Wall · Gonzaga SBA 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #001A4E; --gold: #C8952A;
      --cream: #FDFBF6; --light: #F3F0E8;
      --c-adventure: #E8A020; --c-adventure-lt: #FEF3DC;
      --c-community: #2A7A4E; --c-community-lt: #E8F5EE;
      --c-teaching:  #1A4E8A; --c-teaching-lt:  #E0EAFB;
      --c-heart:     #A0284A; --c-heart-lt:     #FAEAF0;
      --c-spirit:    #5E35A0; --c-spirit-lt:    #F0EAF8;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #0D1829; color: #12100A; min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--navy); padding: 2rem 3rem 1.75rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1.5rem;
    }
    .header-left { display: flex; align-items: center; gap: 2rem; }
    header img { height: 38px; filter: brightness(0) invert(1); opacity: .8; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: white; }
    .header-sub { font-size: .68rem; color: rgba(255,255,255,.4); letter-spacing: .1em; text-transform: uppercase; margin-top: .2rem; }
    .header-count { font-size: .75rem; color: rgba(255,255,255,.35); }

    /* ── FILTERS ── */
    .filter-bar {
      background: rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 1rem 3rem; display: flex; gap: .65rem; flex-wrap: wrap; align-items: center;
    }
    .filter-label { font-size: .65rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.35); margin-right: .25rem; }
    .filter-btn {
      font-size: .7rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; padding: .4rem 1rem; border-radius: 100px;
      border: 1.5px solid rgba(255,255,255,.15); background: transparent;
      color: rgba(255,255,255,.5); cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover { border-color: rgba(255,255,255,.4); color: white; }
    .filter-btn.active { background: var(--gold); border-color: var(--gold); color: white; }
    .filter-btn[data-cat="adventure"].active  { background: var(--c-adventure); border-color: var(--c-adventure); }
    .filter-btn[data-cat="community"].active  { background: var(--c-community); border-color: var(--c-community); }
    .filter-btn[data-cat="teaching"].active   { background: var(--c-teaching);  border-color: var(--c-teaching);  }
    .filter-btn[data-cat="heart"].active      { background: var(--c-heart);     border-color: var(--c-heart);     }
    .filter-btn[data-cat="spirit"].active     { background: var(--c-spirit);    border-color: var(--c-spirit);    }

    /* ── WALL ── */
    .wall {
      padding: 2rem 2.5rem 3rem;
      columns: 4 220px; column-gap: .9rem;
    }

    /* ── CARD ── */
    .card-wrap {
      break-inside: avoid; margin-bottom: .9rem;
      perspective: 1000px; height: 200px;
    }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform .6s cubic-bezier(.4,0,.2,1);
    }
    .card-wrap:hover .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0; border-radius: 12px; overflow: hidden;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }
    .card-back { transform: rotateY(180deg); }

    /* FRONT — big concept, centered */
    .card-front-inner {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .75rem; text-align: center; padding: 1.5rem;
    }
    .card-icon { font-size: 2.4rem; line-height: 1; }
    .card-concept {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; font-weight: 700; color: white;
      line-height: 1.25; letter-spacing: -.01em;
    }

    /* BACK — quote */
    .card-back-inner {
      height: 100%; display: flex; flex-direction: column;
      justify-content: center; gap: .6rem; padding: 1.3rem 1.4rem;
    }
    .card-back-concept {
      font-size: .58rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; opacity: .65;
    }
    .card-back-quote {
      font-family: 'Playfair Display', serif;
      line-height: 1.68; font-style: italic;
    }

    /* CATEGORY COLORS — front: rich color, back: light */
    .cat-adventure .card-front { background: var(--c-adventure); }
    .cat-adventure .card-back  { background: var(--c-adventure-lt); color: #4A2E00; }

    .cat-community .card-front { background: var(--c-community); }
    .cat-community .card-back  { background: var(--c-community-lt); color: #0A2E1A; }

    .cat-teaching .card-front  { background: var(--c-teaching); }
    .cat-teaching .card-back   { background: var(--c-teaching-lt); color: #0A1E40; }

    .cat-heart .card-front     { background: var(--c-heart); }
    .cat-heart .card-back      { background: var(--c-heart-lt); color: #3A0A1A; }

    .cat-spirit .card-front    { background: var(--c-spirit); }
    .cat-spirit .card-back     { background: var(--c-spirit-lt); color: #220A40; }

    /* HIDDEN (filtered out) */
    .card-wrap.hidden { display: none; }

    /* SHUFFLE BUTTON */
    .shuffle-btn {
      display: block; margin: 0 auto 2rem;
      background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.6); font-size: .72rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      padding: .6rem 1.6rem; border-radius: 100px; cursor: pointer;
      transition: all .2s;
    }
    .shuffle-btn:hover { background: rgba(255,255,255,.12); color: white; }

    /* ENTER ANIMATION */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .card-wrap { animation: cardIn .45s ease both; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="source/sba-logo.png" alt="Gonzaga SBA">
    <div>
      <div class="header-title">Ta-Tao · Memory Wall</div>
      <div class="header-sub">Gonzaga SBA · Spring 2026 · Retirement Celebration</div>
    </div>
  </div>
  <div class="header-count" id="visible-count"></div>
</header>

<div class="filter-bar">
  <span class="filter-label">Explore by</span>
  <button class="filter-btn active" data-cat="all">All Memories</button>
  <button class="filter-btn" data-cat="adventure">🏸 Adventure</button>
  <button class="filter-btn" data-cat="community">🤝 Community</button>
  <button class="filter-btn" data-cat="teaching">📚 Teaching</button>
  <button class="filter-btn" data-cat="heart">💛 Heart</button>
  <button class="filter-btn" data-cat="spirit">✨ Spirit</button>
</div>

<div class="wall" id="wall">
  <!-- Cards injected by JS -->
</div>

<button class="shuffle-btn" onclick="shuffle()">↺ Shuffle Cards</button>

<script>
const cards = [
  // ADVENTURE
  { cat: "adventure", icon: "🏸", concept: "Badminton Nights", quote: "When it comes to scheduling grad classes, Ta-Tao can never teach on Wednesday night. It's badminton night at the community center. Badminton runs in his veins." },
  { cat: "adventure", icon: "✈️", concept: "The World Traveler", quote: "There is no better advocate for travel than Ta-Tao! For the last several years, he always has the most amazing photos and gifts he brings back from his travels." },
  { cat: "adventure", icon: "🏅", concept: "The Athlete", quote: "Ta-Tao loved badminton and pickleball, and I was always the spoiled youngster who had some other small plans for big nights." },
  { cat: "adventure", icon: "🎿", concept: "Life Coach", quote: "I told Ta-Tao I was cold. He told me to take up skiing because it made the winters more fun. I appreciate your sound and fun advice. I'm going to miss you!" },
  { cat: "adventure", icon: "🎿", concept: "The Adventurer", quote: "Congratulations on your retirement, Ta-Tao! It's SKI TIME!" },
  { cat: "adventure", icon: "🌍", concept: "Big World, Small Moments", quote: "I loved running into Ta-Tao in a random airport when we were both returning from summer trips to Europe. The world is both big and small!" },

  // COMMUNITY
  { cat: "community", icon: "🍜", concept: "The Community Table", quote: "My fondest memories are lunches in the lounge when Ta-Tao offered to pick up Chinese takeout from Hong Kong Express. What a wonderful community builder!" },
  { cat: "community", icon: "🌉", concept: "The Bridge Builder", quote: "In 2009, Ta-Tao used his contacts and influence to help me get connected with Chang Gung University in Taiwan. I was able to spend three amazing weeks there. He worked tirelessly and enthusiastically to make it happen." },
  { cat: "community", icon: "🍲", concept: "The Welcomer", quote: "Ta-Tao helps ease my transition to Spokane — the beef noodle soup from his wife is excellent!" },
  { cat: "community", icon: "🤝", concept: "Community Builder", quote: "Your perspective, your willingness to share, and your concern for our students has made a difference for me. We will miss you!" },
  { cat: "community", icon: "🍗", concept: "Wing Man", quote: "His love for BBQ chicken wings." },
  { cat: "community", icon: "🔗", concept: "The Connector", quote: "Badminton, Chinese lunch delivery from Hong Kong Express, and learning Power BI together — Ta-Tao connects people through everything he does." },

  // TEACHING
  { cat: "teaching", icon: "💡", concept: "The Innovator", quote: "Your dedication to learning new technologies has been truly inspiring. I will miss having such a wonderful colleague to share learning experiences with." },
  { cat: "teaching", icon: "💻", concept: "Tech Evangelist", quote: "This place will not be the same without you. We will miss seeing you in the hallways and telling us about all the new and nifty tech!" },
  { cat: "teaching", icon: "📚", concept: "The Educator", quote: "You've been such a dedicated and passionate educator. I really enjoyed your workshops — you made information systems less intimidating." },
  { cat: "teaching", icon: "🚀", concept: "The Futurist", quote: "Congratulations on your retirement! I hope to keep hearing from you about AI." },
  { cat: "teaching", icon: "📖", concept: "The Scholar", quote: "Knowing you, I am sure that you will continue to do some professional work after retirement! :)" },
  { cat: "teaching", icon: "🧭", concept: "The Guide", quote: "I appreciate your wonderful advice, working on bringing faculty up to speed on AI, and your passion to promote badminton and pickleball in the SBA." },

  // HEART
  { cat: "heart", icon: "💛", concept: "Gentle Heart", quote: "From the early days, your tender and genuine heart won me over. I am honored to call you colleague and friend and I want you to know you are deeply valued and cherished." },
  { cat: "heart", icon: "🍎", concept: "Health Advocate", quote: "Who is going to look after my health now?! I guess I will just stock tea, apples, and good vibes in the office. When I feel wiped, I'll go on a walk and imagine that you told me to do it!" },
  { cat: "heart", icon: "💙", concept: "The Friend", quote: "Thank you for your help and friendship over the years. You are an amazing colleague and friend — I wish you the best as you begin this new chapter!" },
  { cat: "heart", icon: "⚓", concept: "Steadfast", quote: "Thank you Ta-Tao. You have been a great colleague. Grateful for your support over the years." },
  { cat: "heart", icon: "🤍", concept: "First to Know", quote: "Ta-Tao was the first colleague I told that I was pregnant. He had arranged for me to teach in Taiwan and I had to tell him I couldn't go. He was very sweet and supportive about it, of course." },
  { cat: "heart", icon: "🛡️", concept: "The Protector", quote: "Ta-Tao bravely 'protected' his wife from mice and successfully caught those naughty little troublemakers! :)" },

  // SPIRIT
  { cat: "spirit", icon: "😄", concept: "The Laugher", quote: "We will all miss your exuberant laugh, your thoughtful questions, and the extra effort you put in to help the non-techies among us get more comfortable with technology." },
  { cat: "spirit", icon: "☀️", concept: "The Bright Side", quote: "Your positive attitude has made working at Gonzaga a great place to be! I appreciate your encouragement to keep challenging our students and ourselves." },
  { cat: "spirit", icon: "⚡", concept: "The Energizer", quote: "I will miss your positive energy and zest for life! Best wishes for a happy retirement." },
  { cat: "spirit", icon: "😂", concept: "The Wit", quote: "You have always been helpful, kind, and very witty. May you continue to be as awesome and encouraging as you are." },
  { cat: "spirit", icon: "🕊️", concept: "Free Spirit", quote: "Cheers to retirement! May this next chapter be full of joy, freedom, and just enough plans to keep things interesting." },
  { cat: "spirit", icon: "🌅", concept: "New Horizons", quote: "I wish you joy, peace, and only good surprises. Please come back for lunch or coffee!" },
];

function createCard(card, i) {
  const wrap = document.createElement('div');
  wrap.className = `card-wrap cat-${card.cat}`;
  wrap.dataset.cat = card.cat;
  wrap.style.animationDelay = `${i * 0.04}s`;
  const qLen = card.quote.length;
  const qSize = qLen < 80 ? '1rem' : qLen < 150 ? '.85rem' : qLen < 220 ? '.76rem' : '.68rem';
  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="card-front-inner">
          <div class="card-icon">${card.icon}</div>
          <div class="card-concept">${card.concept}</div>
        </div>
      </div>
      <div class="card-face card-back">
        <div class="card-back-inner">
          <div class="card-back-concept">${card.icon} ${card.concept}</div>
          <div class="card-back-quote" style="font-size:${qSize}">"${card.quote}"</div>
        </div>
      </div>
    </div>`;
  return wrap;
}

function renderCards(data) {
  const wall = document.getElementById('wall');
  wall.innerHTML = '';
  data.forEach((card, i) => wall.appendChild(createCard(card, i)));
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('.card-wrap:not(.hidden)').length;
  document.getElementById('visible-count').textContent = `${visible} memories`;
}

function shuffle() {
  const shuffled = [...cards].sort(() => Math.random() - .5);
  renderCards(shuffled);
  // Re-apply current filter
  const active = document.querySelector('.filter-btn.active').dataset.cat;
  if (active !== 'all') filterCards(active);
}

function filterCards(cat) {
  document.querySelectorAll('.card-wrap').forEach(c => {
    const hide = cat !== 'all' && c.dataset.cat !== cat;
    c.classList.toggle('hidden', hide);
  });
  updateCount();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards(btn.dataset.cat);
  });
});

renderCards(cards);
</script>
</body>
</html>
